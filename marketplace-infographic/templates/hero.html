<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200, height=1200" />
  <title>{{PRODUCT_NAME}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Montserrat:wght@700;900&subset=cyrillic,cyrillic-ext&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />
  {{EXTRA_HEAD_HTML}}
  <style>
{{DESIGN_SYSTEM_CSS}}
{{SKIN_CSS}}

    /* Hero — пропорции как WB: ~20% шапка, ~58% товар, ~22% bullets */
    .layout-hero {
      grid-template-rows: minmax(160px, 20%) minmax(620px, 58%) minmax(140px, 22%);
      grid-template-columns: 1fr;
      gap: 16px;
      align-content: stretch;
    }

    .layout-hero__header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 24px;
      max-width: 100%;
      padding: 0;
      background: none;
      border: none;
      box-shadow: none;
      backdrop-filter: none;
    }

    .layout-hero__header .glass-panel {
      display: contents;
    }

    .layout-hero__title-block {
      max-width: 100%;
    }

    .layout-hero__header .display-title {
      font-size: 68px;
      text-align: left;
    }

    .layout-hero__header .display-subtitle {
      font-size: 36px;
      text-align: left;
    }

    .layout-hero__header .brand-mark {
      text-align: right;
      padding-top: 8px;
    }

    .layout-hero__product {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      min-height: 620px;
      padding: 0 8px;
    }

    .layout-hero__bullets {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      width: 100%;
      padding-bottom: 4px;
    }

    .layout-hero__bullets .bullet-list {
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
    }

    .layout-hero__bullets .bullet-item {
      flex: 0 1 auto;
      max-width: 300px;
      padding: 14px 20px;
    }

    .layout-hero__bullets .bullet-text {
      font-size: 32px;
    }

    .layout-hero__promo-slot {
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="canvas" data-layout="hero" data-style="{{STYLE}}">
    <div class="canvas-bg" style="{{BACKGROUND_STYLE}}"></div>
    {{OVERLAY_HTML}}

    <div class="canvas-grid layout-hero">
      <header class="layout-hero__header">
        <div class="layout-hero__title-block">
          <h1 class="display-title">{{HEADLINE}}</h1>
          <p class="display-subtitle">{{SUBTITLE}}</p>
          <div class="layout-hero__promo-slot">{{PROMO_HTML}}</div>
        </div>
        <p class="brand-mark">{{BRAND}}</p>
      </header>

      <section class="layout-hero__product" aria-label="Товар">
        <div class="product-row">
          <aside class="product-row__badges product-row__badges--left">
            {{SIDE_BADGES_LEFT}}
          </aside>
          <div class="product-row__center">
            <div class="ground-plane" aria-hidden="true"></div>
            <div class="ground-line" aria-hidden="true"></div>
            <div class="ground-ambient-shadow" aria-hidden="true"></div>
            <div class="ground-contact-shadow" aria-hidden="true"></div>
            {{PRODUCT_HTML}}
          </div>
          <aside class="product-row__badges product-row__badges--right">
            {{SIDE_BADGES_RIGHT}}
          </aside>
        </div>
      </section>

      <section class="layout-hero__bullets" aria-label="Преимущества">
        {{BULLETS_HTML}}
      </section>
    </div>
  </div>
</body>
</html>
