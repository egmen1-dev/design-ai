<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200, height=1200" />
  <title>{{PRODUCT_NAME}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@600;700;800;900&subset=cyrillic,cyrillic-ext&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />
  {{EXTRA_HEAD_HTML}}
  <style>
{{DESIGN_SYSTEM_CSS}}
{{SKIN_CSS}}

    .layout-marketplace {
      --safe-top: 36px;
      --safe-side: 32px;
      --safe-bottom: 28px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 8px;
      padding: var(--safe-top) var(--safe-side) var(--safe-bottom);
      height: 100%;
      box-sizing: border-box;
    }

    .mp-header {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
      max-width: 68%;
      z-index: 5;
    }

    .mp-title {
      font-family: var(--font-display);
      font-size: 54px;
      font-weight: 800;
      line-height: 1.02;
      letter-spacing: -0.025em;
      color: var(--accent-readable, var(--accent)) !important;
      text-transform: none;
      text-shadow: none !important;
      margin: 0;
    }

    .mp-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 20px;
      border-radius: 999px;
      color: #fff;
      box-shadow: 0 8px 22px rgba(0,0,0,0.16);
    }

    .mp-pill__icon { font-size: 20px; }
    .mp-pill__text {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.05em;
    }

    .mp-body {
      display: grid;
      grid-template-columns: 168px 1fr 118px;
      gap: 0;
      align-items: start;
      min-height: 0;
      position: relative;
    }

    .mp-body--no-sidebar {
      grid-template-columns: 168px 1fr;
    }

    .mp-left {
      z-index: 5;
      padding-top: 4px;
    }

    /* ——— Левая плашка (референс) ——— */
    .mp-left-panel {
      background: rgba(255,255,255,0.97);
      border-radius: 20px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.14), 0 2px 8px rgba(0,0,0,0.06);
      overflow: hidden;
      width: 168px;
    }

    .mp-left-panel__hero {
      position: relative;
      padding: 18px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .mp-left-panel__hero-label {
      font-size: 13px;
      font-weight: 800;
      color: #334155;
      letter-spacing: 0.02em;
      text-transform: lowercase;
    }

    .mp-left-panel__hero-value {
      font-family: var(--font-display);
      font-size: 42px;
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.03em;
    }

    .mp-left-panel__hero-icon {
      position: absolute;
      top: 16px;
      right: 12px;
      font-size: 26px;
      opacity: 0.85;
    }

    .mp-left-panel__secondary {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 14px 10px;
      font-size: 12px;
      color: #475569;
    }

    .mp-left-panel__secondary-value {
      font-weight: 800;
      color: #0f172a;
    }

    .mp-left-panel__secondary-label {
      font-weight: 600;
    }

    .mp-left-panel__gift-visual {
      display: flex;
      gap: 8px;
      padding: 8px 12px 12px;
      justify-content: center;
    }

    .mp-left-panel__gift-icon {
      flex: 1;
      height: 52px;
      border-radius: 12px;
      background: linear-gradient(145deg, #f1f5f9, #e2e8f0);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
    }

    .mp-left-panel__gift-icon .material-symbols-outlined { font-size: 28px; }

    .mp-left-panel__gift-visual--placeholder {
      height: 52px;
      margin: 0 12px 12px;
      border-radius: 12px;
      background: linear-gradient(145deg, #f1f5f9, #e2e8f0);
      color: #64748b;
    }

    .mp-left-panel__footer {
      padding: 12px 14px;
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.25;
      letter-spacing: 0.01em;
      text-align: center;
    }

    .mp-product {
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      min-height: 0;
      height: 100%;
      z-index: 3;
      padding: 0 0 8px;
      margin-top: -20px;
    }

    .mp-product .product-frame {
      transform: rotate(-17deg) translateX(24px) translateY(-12px);
      transform-origin: center bottom;
      filter: drop-shadow(0 28px 48px rgba(0,0,0,0.28));
    }

    .mp-product .product-photo--cutout {
      max-height: 820px;
      max-width: 520px;
    }

    .mp-product--merged {
      pointer-events: none;
      min-height: 0;
      padding: 0;
      margin-top: 0;
    }

    .mp-product--merged .product-frame {
      display: none;
    }

    .mp-product .ground-contact-shadow {
      display: none;
    }

    /* ——— Правая плашка (компактная) ——— */
    .mp-sidebar-wrap {
      z-index: 5;
      padding-top: 48px;
      display: flex;
      justify-content: flex-end;
    }

    .mp-sidebar {
      width: 118px;
      border-radius: 20px 0 0 20px;
      background: linear-gradient(
        180deg,
        var(--sidebar-accent, #00a8b5) 0%,
        color-mix(in srgb, var(--sidebar-accent, #00a8b5) 88%, #000) 55%,
        color-mix(in srgb, var(--sidebar-accent, #00a8b5) 35%, transparent) 100%
      );
      box-shadow: -8px 12px 32px rgba(0,0,0,0.14);
      overflow: hidden;
    }

    .mp-sidebar__inner {
      padding: 22px 10px 18px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      min-height: 320px;
      max-height: 420px;
    }

    .mp-sidebar__item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 4px;
      color: #fff;
    }

    .mp-sidebar__icon {
      font-size: 26px;
      opacity: 0.92;
    }

    .mp-sidebar__value {
      font-family: var(--font-display);
      font-size: 56px;
      font-weight: 900;
      line-height: 0.92;
      letter-spacing: -0.04em;
    }

    .mp-sidebar__label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      line-height: 1.2;
      opacity: 0.95;
      max-width: 100px;
    }

    .mp-sidebar__footer {
      margin-top: auto;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.28);
      text-align: center;
    }

    .mp-sidebar__footer-text {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.07em;
      line-height: 1.3;
      color: #fff;
      opacity: 0.95;
    }

    .mp-footer {
      display: flex;
      justify-content: center;
      padding-top: 2px;
      z-index: 5;
    }

    .mp-bottom-ribbon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 32px;
      border-radius: 999px;
      color: #fff;
      box-shadow: 0 10px 24px rgba(0,0,0,0.16);
      max-width: 88%;
    }

    .mp-bottom-ribbon__text {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="canvas" data-layout="marketplace" data-style="{{STYLE}}">
    <div class="canvas-bg" style="{{BACKGROUND_STYLE}}"></div>
    {{OVERLAY_HTML}}

    <div class="canvas-grid layout-marketplace">
      <header class="mp-header">
        <h1 class="mp-title">{{HEADLINE}}</h1>
        {{PILL_HTML}}
      </header>

      <div class="mp-body{{BODY_CLASS}}">
        <aside class="mp-left" aria-label="Характеристики">
          {{LEFT_SPECS_HTML}}
        </aside>

        <section class="mp-product{{MERGED_PRODUCT_CLASS}}" aria-label="Товар">
          {{PRODUCT_HTML}}
        </section>

        {{SIDEBAR_WRAP_HTML}}
      </div>

      <footer class="mp-footer">
        {{BOTTOM_RIBBON_HTML}}
      </footer>
    </div>
  </div>
</body>
</html>
