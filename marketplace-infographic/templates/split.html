<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200, height=1200" />
  <title>{{PRODUCT_NAME}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Montserrat:wght@700;900&subset=cyrillic,cyrillic-ext&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />
  {{EXTRA_HEAD_HTML}}
  <style>
{{DESIGN_SYSTEM_CSS}}
{{SKIN_CSS}}

    /* Split layout — copy left, product right */
    .layout-split {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr;
      gap: var(--gap-lg);
      align-items: center;
    }

    .layout-split__copy {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: var(--gap-md);
      height: 100%;
      padding-right: 12px;
    }

    .layout-split__copy .glass-panel {
      display: flex;
      flex-direction: column;
      gap: var(--gap-sm);
    }

    .layout-split__product {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    .layout-split__product .product-frame {
      width: 100%;
      height: min(720px, 100%);
      background: rgba(0, 0, 0, 0.18);
    }

    .layout-split__product .product-photo {
      max-height: 640px;
    }

    .layout-split .bullet-list {
      margin-top: 8px;
    }

    .layout-split .bullet-item {
      padding: 16px 22px;
    }
  </style>
</head>
<body>
  <div class="canvas" data-layout="split" data-style="{{STYLE}}">
    <div class="canvas-bg" style="{{BACKGROUND_STYLE}}"></div>
    {{OVERLAY_HTML}}
    <div class="deco-ring deco-ring--br"></div>

    <div class="canvas-grid layout-split">
      <div class="layout-split__copy">
        <div class="glass-panel">
          <p class="brand-mark">{{BRAND}}</p>
          <h1 class="display-title" style="font-size: 80px;">{{HEADLINE}}</h1>
          <p class="display-subtitle" style="font-size: 44px;">{{SUBTITLE}}</p>
          <div class="deco-line"></div>
          {{PROMO_HTML}}
        </div>
        <div>
          {{BULLETS_HTML}}
        </div>
      </div>

      <section class="layout-split__product" aria-label="Товар">
        <div class="product-row" style="grid-template-columns: 1fr;">
          <div class="product-row__center">
            <div class="ground-plane" aria-hidden="true"></div>
            <div class="ground-line" aria-hidden="true"></div>
            <div class="ground-ambient-shadow" aria-hidden="true"></div>
            <div class="ground-contact-shadow" aria-hidden="true"></div>
            {{PRODUCT_HTML}}
          </div>
        </div>
      </section>
    </div>
  </div>
</body>
</html>
