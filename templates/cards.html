<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200, height=1200" />
  <title>{{PRODUCT_NAME}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Montserrat:wght@700;900&subset=cyrillic,cyrillic-ext&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />
  <style>
{{DESIGN_SYSTEM_CSS}}
{{SKIN_CSS}}

    /* Cards layout — title top, product center, spec cards bottom */
    .layout-cards {
      grid-template-rows: auto 1fr auto;
      grid-template-columns: 1fr;
      gap: var(--gap-lg);
    }

    .layout-cards__header {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--gap-md);
    }

    .layout-cards__header-main {
      flex: 1 1 60%;
      min-width: 280px;
    }

    .layout-cards__header .display-title {
      font-size: 84px;
    }

    .layout-cards__header .display-subtitle {
      font-size: 48px;
    }

    .layout-cards__product {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    .layout-cards__product .product-frame {
      width: min(760px, 100%);
      height: min(480px, 100%);
    }

    .layout-cards__specs {
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="canvas" data-layout="cards" data-style="{{STYLE}}">
    <div class="canvas-bg" style="{{BACKGROUND_STYLE}}"></div>
    {{OVERLAY_HTML}}
    <div class="deco-ring deco-ring--tl"></div>

    <div class="canvas-grid layout-cards">
      <header class="layout-cards__header">
        <div class="layout-cards__header-main glass-panel">
          <p class="brand-mark">{{BRAND}}</p>
          <h1 class="display-title">{{HEADLINE}}</h1>
          <p class="display-subtitle">{{SUBTITLE}}</p>
        </div>
        {{PROMO_HTML}}
      </header>

      <section class="layout-cards__product" aria-label="Товар">
        {{PRODUCT_HTML}}
      </section>

      <section class="layout-cards__specs" aria-label="Характеристики">
        {{SPEC_CARDS_HTML}}
      </section>
    </div>
  </div>
</body>
</html>
