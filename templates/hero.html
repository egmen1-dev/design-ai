<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200, height=1200" />
  <title>{{PRODUCT_NAME}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Montserrat:wght@700;900&subset=cyrillic,cyrillic-ext&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />
  <style>
{{DESIGN_SYSTEM_CSS}}
{{SKIN_CSS}}

    /* Hero layout — centered vertical flow */
    .layout-hero {
      grid-template-rows: auto 1fr auto;
      grid-template-columns: 1fr;
      gap: var(--gap-lg);
      align-content: stretch;
    }

    .layout-hero__header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 92%;
      margin: 0 auto;
    }

    .layout-hero__product {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      min-height: 0;
      padding: 0 20px;
    }

    .layout-hero__product .product-frame {
      width: min(880px, 100%);
      height: min(520px, 100%);
      background: rgba(0, 0, 0, 0.22);
    }

    .layout-hero__bullets {
      display: flex;
      justify-content: center;
      width: 100%;
      padding-bottom: 8px;
    }

    .layout-hero__bullets .bullet-list {
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 100%;
      gap: 20px;
    }

    .layout-hero__bullets .bullet-item {
      flex: 0 1 auto;
      max-width: 340px;
    }

    .layout-hero__promo {
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="canvas" data-layout="hero" data-style="{{STYLE}}">
    <div class="canvas-bg" style="{{BACKGROUND_STYLE}}"></div>
    {{OVERLAY_HTML}}
    <div class="deco-ring deco-ring--tl"></div>
    <div class="deco-ring deco-ring--br"></div>

    <div class="canvas-grid layout-hero">
      <header class="layout-hero__header glass-panel">
        <p class="brand-mark">{{BRAND}}</p>
        <h1 class="display-title">{{HEADLINE}}</h1>
        <p class="display-subtitle">{{SUBTITLE}}</p>
        <div class="deco-line" style="margin-left: auto; margin-right: auto;"></div>
        {{PROMO_HTML}}
      </header>

      <section class="layout-hero__product" aria-label="Товар">
        {{PRODUCT_HTML}}
      </section>

      <section class="layout-hero__bullets" aria-label="Преимущества">
        {{BULLETS_HTML}}
      </section>
    </div>
  </div>
</body>
</html>
