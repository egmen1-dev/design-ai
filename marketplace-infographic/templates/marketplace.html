<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200, height=1200" />
  <title>{{PRODUCT_NAME}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@600;700;800;900&subset=cyrillic,cyrillic-ext&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />
  {{EXTRA_HEAD_HTML}}
  <style>
{{DESIGN_SYSTEM_CSS}}
{{SKIN_CSS}}

    /* Полный кадр 1200 — не узкая полоса 900px */
    .canvas-grid.layout-marketplace {
      width: 100% !important;
      max-width: 1200px !important;
      padding: 36px 28px 24px !important;
      display: grid !important;
      grid-template-rows: auto 1fr auto;
      gap: 6px;
      box-sizing: border-box;
    }

    .mp-header {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      max-width: 62%;
      z-index: 6;
      position: relative;
    }

    .mp-title {
      font-family: var(--font-display);
      font-size: 56px;
      font-weight: 800;
      line-height: 1.02;
      letter-spacing: -0.025em;
      color: var(--accent-readable, var(--accent)) !important;
      text-shadow: none !important;
      margin: 0;
    }

    .mp-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      border-radius: 999px;
      color: #fff;
      box-shadow: 0 6px 18px rgba(0,0,0,0.14);
    }

    .mp-pill__icon { font-size: 18px; }
    .mp-pill__text {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.06em;
    }

    .mp-body {
      position: relative;
      display: grid;
      grid-template-columns: 156px 1fr 112px;
      gap: 0;
      align-items: start;
      min-height: 780px;
      flex: 1;
    }

    .mp-body--no-sidebar {
      grid-template-columns: 156px 1fr;
    }

    .mp-left {
      z-index: 6;
      position: relative;
      padding-top: 12px;
    }

    .mp-left-panel {
      background: rgba(255,255,255,0.98);
      border-radius: 18px;
      box-shadow: 0 14px 36px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.05);
      overflow: hidden;
      width: 156px;
    }

    .mp-left-panel__hero {
      position: relative;
      padding: 16px 12px 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto;
      column-gap: 4px;
      align-items: end;
    }

    .mp-left-panel__hero-label {
      grid-column: 1;
      font-size: 12px;
      font-weight: 800;
      color: #475569;
      letter-spacing: 0.01em;
    }

    .mp-left-panel__hero-value {
      grid-column: 1;
      font-family: var(--font-display);
      font-size: 38px;
      font-weight: 900;
      line-height: 0.92;
      letter-spacing: -0.03em;
    }

    .mp-left-panel__hero-icon {
      grid-column: 2;
      grid-row: 1 / span 2;
      align-self: center;
      font-size: 24px;
      opacity: 0.8;
    }

    .mp-left-panel__secondary {
      display: none;
    }

    .mp-left-panel__gift-visual {
      display: flex;
      gap: 6px;
      padding: 6px 10px 10px;
      justify-content: center;
    }

    .mp-left-panel__gift-icon {
      flex: 1;
      height: 48px;
      border-radius: 10px;
      background: linear-gradient(160deg, #f8fafc, #e2e8f0);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
      border: 1px solid rgba(148,163,184,0.25);
    }

    .mp-left-panel__gift-icon .material-symbols-outlined { font-size: 26px; }

    .mp-left-panel__gift-visual--placeholder {
      height: 48px;
      margin: 0 10px 10px;
      border-radius: 10px;
      background: linear-gradient(160deg, #f8fafc, #e2e8f0);
      color: #64748b;
    }

    .mp-left-panel__footer {
      padding: 11px 10px;
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      line-height: 1.3;
      text-align: center;
    }

    /* Товар — отдельный слой поверх фона, крупный, по диагонали */
    .mp-product {
      position: absolute;
      left: 130px;
      right: 96px;
      top: 20px;
      bottom: 0;
      z-index: 3;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      pointer-events: none;
    }

    .mp-product .product-wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .mp-product .product-frame {
      position: relative;
      transform: rotate(-19deg) translateX(6%) translateY(0);
      transform-origin: 55% 92%;
      filter: drop-shadow(0 36px 52px rgba(0,0,0,0.32));
    }

    .mp-product .product-frame::after {
      content: "";
      position: absolute;
      left: 18%;
      right: 12%;
      bottom: -8px;
      height: 28px;
      background: radial-gradient(ellipse, rgba(0,0,0,0.38) 0%, rgba(0,0,0,0.12) 45%, transparent 72%);
      transform: rotate(19deg) scaleX(1.15);
      z-index: -1;
    }

    .mp-product .product-photo--cutout {
      max-height: 94%;
      max-width: min(520px, 88%);
      width: auto;
      height: auto;
      object-fit: contain;
      object-position: bottom center;
    }

    .mp-product--merged {
      display: none;
    }

    .mp-sidebar-wrap {
      z-index: 6;
      position: relative;
      padding-top: 56px;
      display: flex;
      justify-content: flex-end;
    }

    .mp-sidebar {
      width: 112px;
      border-radius: 18px 0 0 18px;
      background: linear-gradient(
        180deg,
        var(--sidebar-accent, #00a8b5) 0%,
        color-mix(in srgb, var(--sidebar-accent, #00a8b5) 92%, #0f172a) 48%,
        color-mix(in srgb, var(--sidebar-accent, #00a8b5) 55%, transparent) 100%
      );
      box-shadow: -6px 10px 28px rgba(0,0,0,0.12);
    }

    .mp-sidebar__inner {
      padding: 20px 8px 16px;
      display: flex;
      flex-direction: column;
      gap: 26px;
      min-height: 300px;
      max-height: 380px;
    }

    .mp-sidebar__item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 6px;
      color: #fff;
    }

    .mp-sidebar__icon { font-size: 24px; opacity: 0.9; }

    .mp-sidebar__value {
      font-family: var(--font-display);
      font-size: 52px;
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: -0.04em;
    }

    .mp-sidebar__label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.05em;
      line-height: 1.25;
      padding: 0 4px;
    }

    .mp-sidebar__footer {
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.3);
    }

    .mp-sidebar__footer-text {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.08em;
      line-height: 1.35;
      color: #fff;
    }

    .mp-footer {
      z-index: 6;
      position: relative;
      display: flex;
      justify-content: center;
      padding-top: 0;
    }

    .mp-bottom-ribbon {
      display: inline-flex;
      padding: 10px 28px;
      border-radius: 999px;
      color: #fff;
      box-shadow: 0 8px 20px rgba(0,0,0,0.14);
    }

    .mp-bottom-ribbon__text {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <div class="canvas" data-layout="marketplace" data-style="{{STYLE}}">
    <div class="canvas-bg" style="{{BACKGROUND_STYLE}}"></div>
    {{OVERLAY_HTML}}

    <div class="canvas-grid layout-marketplace">
      <header class="mp-header">
        <h1 class="mp-title">{{HEADLINE}}</h1>
        {{PILL_HTML}}
      </header>

      <div class="mp-body{{BODY_CLASS}}">
        <aside class="mp-left" aria-label="Характеристики">
          {{LEFT_SPECS_HTML}}
        </aside>

        <section class="mp-product{{MERGED_PRODUCT_CLASS}}" aria-label="Товар">
          {{PRODUCT_HTML}}
        </section>

        {{SIDEBAR_WRAP_HTML}}
      </div>

      <footer class="mp-footer">
        {{BOTTOM_RIBBON_HTML}}
      </footer>
    </div>
  </div>
</body>
</html>
